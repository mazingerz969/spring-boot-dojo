<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Study - Spring Boot Dojo')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="d-flex align-items-center mb-4">
        <a href="/dashboard" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i> Back
        </a>
        <h3 class="mb-0">
            <i class="bi bi-book"></i>
            <span th:text="${beltLabel}">Belt</span> - Study Mode
        </h3>
    </div>

    <div th:if="${error}" class="alert alert-warning" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(flashcards)}" class="alert alert-info">
        No flashcards available for this level yet.
    </div>

    <div th:if="${!#lists.isEmpty(flashcards)}" class="mb-3 text-muted">
        <span th:text="${#lists.size(flashcards)}">0</span> flashcards available.
        Click on a card to reveal the answer.
    </div>

    <div class="row g-3">
        <div th:each="card, iter : ${flashcards}" class="col-12">
            <div class="card flashcard shadow-sm" th:id="'card-' + ${iter.index}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <span class="badge bg-secondary" th:text="'#' + (${iter.index} + 1)">1</span>
                        <span class="badge bg-info" th:text="${card['category']}">Category</span>
                    </div>
                    <h5 class="card-title mt-2" th:text="${card['question']}">Question</h5>
                    <div class="answer-section mt-3" style="display: none;"
                         th:id="'answer-' + ${iter.index}">
                        <hr>
                        <p class="card-text text-success" th:text="${card['answer']}">Answer</p>
                    </div>
                    <button class="btn btn-sm btn-outline-primary mt-2"
                            th:onclick="'toggleAnswer(' + ${iter.index} + ')'">
                        <i class="bi bi-eye"></i> <span>Show Answer</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

<script>
    function toggleAnswer(index) {
        var answerEl = document.getElementById('answer-' + index);
        var btn = answerEl.parentElement.querySelector('button');
        if (answerEl.style.display === 'none') {
            answerEl.style.display = 'block';
            btn.innerHTML = '<i class="bi bi-eye-slash"></i> <span>Hide Answer</span>';
        } else {
            answerEl.style.display = 'none';
            btn.innerHTML = '<i class="bi bi-eye"></i> <span>Show Answer</span>';
        }
    }
</script>
</body>
</html>
