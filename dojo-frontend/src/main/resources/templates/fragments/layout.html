<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Spring Boot Dojo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-fire"></i> Spring Boot Dojo
        </a>
        <div class="navbar-nav me-auto" th:if="${session.username != null}">
            <a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link" href="/study"><i class="bi bi-book"></i> Study</a>
            <a class="nav-link" href="/quiz"><i class="bi bi-question-circle"></i> Quiz</a>
            <a class="nav-link" href="/exercises"><i class="bi bi-code-slash"></i> Ejercicios</a>
        </div>
        <div class="navbar-nav ms-auto" th:if="${session.username != null}">
            <span class="navbar-text me-3">
                <i class="bi bi-person-circle"></i>
                <span th:text="${session.username}">User</span>
            </span>
            <a class="nav-link" href="/logout">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>
</nav>

<footer th:fragment="footer">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
