<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quiz Results - Spring Boot Dojo')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow mb-4">
                <div class="card-header bg-dark text-white text-center">
                    <h4 class="mb-0"><i class="bi bi-trophy"></i> Quiz Complete!</h4>
                </div>
                <div class="card-body text-center p-5">
                    <h2 th:text="${beltLabel}" class="text-muted mb-3">Belt</h2>

                    <div class="display-1 fw-bold mb-3"
                         th:classappend="${percentage >= 80} ? 'text-success' : (${percentage >= 50} ? 'text-warning' : 'text-danger')">
                        <span th:text="${percentage}">0</span>%
                    </div>

                    <p class="fs-5 text-muted">
                        You got <strong th:text="${correct}">0</strong> out of
                        <strong th:text="${total}">0</strong> correct
                    </p>

                    <div class="progress mb-4" style="height: 20px;">
                        <div class="progress-bar" role="progressbar"
                             th:classappend="${percentage >= 80} ? 'bg-success' : (${percentage >= 50} ? 'bg-warning' : 'bg-danger')"
                             th:style="'width: ' + ${percentage} + '%'"
                             th:text="${percentage} + '%'">0%</div>
                    </div>

                    <div th:if="${percentage >= 80}" class="alert alert-success">
                        <i class="bi bi-star-fill"></i> Excellent! You're mastering this belt level!
                    </div>
                    <div th:if="${percentage >= 50 and percentage < 80}" class="alert alert-warning">
                        <i class="bi bi-lightning"></i> Good effort! Keep practicing to master this level.
                    </div>
                    <div th:if="${percentage < 50}" class="alert alert-info">
                        <i class="bi bi-book"></i> Review the flashcards for this level and try again!
                    </div>

                    <div class="mt-4">
                        <a th:href="@{/quiz(difficulty=${difficulty})}" class="btn btn-primary me-2">
                            <i class="bi bi-arrow-repeat"></i> Retry Quiz
                        </a>
                        <a th:href="@{/study(difficulty=${difficulty})}" class="btn btn-outline-secondary me-2">
                            <i class="bi bi-book"></i> Study Flashcards
                        </a>
                        <a href="/dashboard" class="btn btn-outline-dark">
                            <i class="bi bi-house"></i> Dashboard
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${!#lists.isEmpty(answers)}" class="card shadow">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-list-check"></i> Answer Review</h5>
                </div>
                <div class="card-body p-0">
                    <div class="list-group list-group-flush">
                        <div th:each="answer, iter : ${answers}" class="list-group-item">
                            <div class="d-flex align-items-start">
                                <span class="badge me-2 mt-1"
                                      th:classappend="${answer['correct']} ? 'bg-success' : 'bg-danger'">
                                    <i th:class="${answer['correct']} ? 'bi bi-check' : 'bi bi-x'"></i>
                                </span>
                                <div>
                                    <p class="mb-1 fw-semibold" th:text="${answer['question']}">Question</p>
                                    <small class="text-muted">
                                        Correct answer: <span th:text="${answer['correctAnswer']}">Answer</span>
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
