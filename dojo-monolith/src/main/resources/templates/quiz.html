<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quiz - Spring Boot Dojo')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="d-flex align-items-center mb-4">
        <a href="/dashboard" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i> Quit
        </a>
        <h3 class="mb-0">
            <i class="bi bi-patch-question"></i>
            <span th:text="${beltLabel}">Belt</span> - Quiz Mode
        </h3>
        <span class="badge bg-primary ms-auto fs-6">
            Question <span th:text="${questionNumber}">1</span> / <span th:text="${totalQuestions}">5</span>
        </span>
    </div>

    <div class="mb-3">
        <div class="progress" style="height: 8px;">
            <div class="progress-bar bg-success" role="progressbar"
                 th:style="'width: ' + ${(questionNumber * 100) / totalQuestions} + '%'"></div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <div class="d-flex justify-content-between">
                        <span><i class="bi bi-question-circle"></i> Question <span th:text="${questionNumber}">1</span></span>
                        <span class="badge bg-success">
                            <i class="bi bi-check-circle"></i> <span th:text="${correct}">0</span> correct
                        </span>
                    </div>
                </div>
                <div class="card-body p-4">
                    <h5 class="card-title mb-4" th:text="${quiz['question']}">Question text</h5>

                    <form action="/quiz/answer" method="post">
                        <div class="list-group mb-4">
                            <label class="list-group-item list-group-item-action d-flex align-items-center">
                                <input type="radio" name="selectedOption" value="0" class="form-check-input me-3" required>
                                <span class="badge bg-secondary me-2">A</span>
                                <span th:text="${quiz['optionA']}">Option A</span>
                            </label>
                            <label class="list-group-item list-group-item-action d-flex align-items-center">
                                <input type="radio" name="selectedOption" value="1" class="form-check-input me-3">
                                <span class="badge bg-secondary me-2">B</span>
                                <span th:text="${quiz['optionB']}">Option B</span>
                            </label>
                            <label class="list-group-item list-group-item-action d-flex align-items-center">
                                <input type="radio" name="selectedOption" value="2" class="form-check-input me-3">
                                <span class="badge bg-secondary me-2">C</span>
                                <span th:text="${quiz['optionC']}">Option C</span>
                            </label>
                            <label class="list-group-item list-group-item-action d-flex align-items-center">
                                <input type="radio" name="selectedOption" value="3" class="form-check-input me-3">
                                <span class="badge bg-secondary me-2">D</span>
                                <span th:text="${quiz['optionD']}">Option D</span>
                            </label>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-send"></i> Submit Answer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
